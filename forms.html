<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Demo</title>
</head>

<body>
    <h1>Forms Demo</h1>
    <form action="/tacos">
        <p>
            <label for="username">Enter a Username:</label>
            <input id="username" type="text" placeholder="username" name="chickenman">
        </p>
        <p>
            <label for="password">Enter a Password:</label>
            <input id="password"type="password" placeholder="password">
        </p>
        
        <p>
            <label for="color">Enter a Color:</label>
            <input type="color" id="color">
        </p>

        <p>
            <label for="number">Enter a number:</label>
            <input type="number" placeholder="enter a number" id="number">
        </p>
        
        <button>submit</button>
        <button type="button">submit!!!!</button>
        <input type="submit" value="click me">
    </form>
    <h2>Hijacking Searches</h2>
    <h3>Hijacking Reddit</h3>
    <form action="https://www.reddit.com/search">
        <input type="text" name="q">
        <button>Search reddit</button>
    </form>
    <h3>Hijacking Google</h3>
    <form action="https://www.google.com/search">
        <input type="text" name="q">
        <button>Search Google</button>
    </form>
    <h3>Hijacking Youtube</h3>
    <form action="https://www.youtube.com/results">
        <input type="text" name="search_query">
        <button>Search Youtube</button>
    </form>

    <h2>More Inputs!</h2>
    <form action="/birds">
        <input type="checkbox" name="agree_tos" id="agree" checked>
        <label for="agree">I agree to everything</label>
        <button>submit</button>
    </form>
        <label for="xs">XS</label>

            <option value="Lamb">Lamb</option>
            <option value="Chips">Chips</option>
            <option value="Wine">Wine</option>
        </select>
    </form>

    <form>
